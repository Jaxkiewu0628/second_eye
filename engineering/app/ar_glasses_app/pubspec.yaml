name: ar_glasses_app
description: "AR Sports Glasses Companion App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # BLE
  flutter_blue_plus: ^1.35.3

  # Video (RTSP H.265)
  media_kit: ^1.1.11
  media_kit_video: ^1.2.4
  media_kit_libs_video: ^1.0.4

  # WebSocket
  web_socket_channel: ^3.0.1

  # State management
  flutter_riverpod: ^2.6.1

  # Permissions
  permission_handler: ^11.3.1

  # UI utilities
  flutter_animate: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
